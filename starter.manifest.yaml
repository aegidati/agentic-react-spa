id: agentic-react-spa
name: Agentic React SPA
version: 0.1.0
type: frontend
installsInto: app/web

ownedPaths:
  - app/web

dependencies: []

optionalDependencies:
  - agentic-api-contracts-api
  - agentic-fullstack-composition

provides:
  - react-spa-foundation
  - vite-foundation
  - frontend-routing-foundation
  - web-ui-bootstrap

requires:
  - node-runtime
  - frontend-package-manager

postInstallChecks:
  - frontend dependencies install successfully
  - frontend build command runs
  - frontend lint command runs
  - frontend dev server command is valid

tags:
  - agentic
  - starter
  - frontend
  - react
  - vite
  - spa
